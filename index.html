
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, #app { font-family: 'Rajdhani', sans-serif; background: #0d0f12; color: #e0e0e0; min-height: 100vh; }
  .screen { display: none; padding: 0; }
  .screen.active { display: block; }

  /* MAP LIST */
  .header { background: #0d0f12; padding: 14px 16px 10px; border-bottom: 1px solid #1e2229; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #f0b429; }
  .header p { font-size: 11px; color: #666; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .maps-grid { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .map-card { background: #13161b; border: 1px solid #1e2229; border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.1s; position: relative; }
  .map-card:active { transform: scale(0.97); }
  .map-card:hover { border-color: #f0b429; }
  .map-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #1a1e25; position: relative; }
  .map-thumb-img { width: 100%; height: 100%; display: block; }
  .map-info { padding: 10px 12px; }
  .map-name { font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f0e0b0; }
  .map-meta { font-size: 11px; color: #888; margin-top: 3px; letter-spacing: 0.5px; }
  .lineup-badge { position: absolute; top: 8px; right: 8px; background: #f0b429; color: #0d0f12; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.5px; }

  /* MAP DETAIL */
  .back-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: #0d0f12; border-bottom: 1px solid #1e2229; cursor: pointer; position: sticky; top: 0; z-index: 20; }
  .back-bar span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #f0b429; }
  .back-arr { color: #f0b429; font-size: 16px; line-height: 1; }
  .map-detail-name { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #f0e0b0; margin-left: auto; text-transform: uppercase; }

  .minimap-wrap { position: relative; margin: 16px; background: #13161b; border: 1px solid #1e2229; border-radius: 10px; overflow: hidden; }
  .minimap-svg { width: 100%; display: block; }

  .legend { display: flex; gap: 12px; padding: 0 16px 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; letter-spacing: 0.5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .lineup-list { padding: 0 16px 80px; }
  .lineup-list h3 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 10px; }
  .lineup-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #13161b; border: 1px solid #1e2229; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .lineup-row:hover { border-color: #f0b429; }
  .lineup-row-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .lineup-row-info { flex: 1; }
  .lineup-row-title { font-size: 13px; font-weight: 700; color: #e0d0b0; letter-spacing: 0.5px; }
  .lineup-row-sub { font-size: 11px; color: #666; margin-top: 2px; }
  .lineup-row-arr { color: #444; font-size: 14px; }

  /* POPUP OVERLAY */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .popup { background: #13161b; border: 1px solid #2a2f38; border-radius: 16px 16px 0 0; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; padding: 0 0 32px; }
  .popup-handle { width: 36px; height: 4px; background: #2a2f38; border-radius: 2px; margin: 12px auto 0; }
  .popup-header { padding: 14px 16px 10px; border-bottom: 1px solid #1e2229; }
  .popup-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #f0e0b0; }
  .popup-nade { display: inline-block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; margin-top: 4px; font-weight: 700; }
  .nade-smoke { background: #1e3a2a; color: #4ecb8d; }
  .nade-flash { background: #3a3010; color: #f0c040; }
  .nade-molotov { background: #3a1a0a; color: #f07040; }
  .nade-he { background: #3a0a0a; color: #f04040; }

  .popup-images { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px; }
  .popup-img-wrap { background: #0d0f12; border: 1px solid #1e2229; border-radius: 8px; overflow: hidden; }
  .popup-img-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #888; padding: 6px 8px 4px; }
  .popup-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: flex; align-items: center; justify-content: center; background: #0d0f12; }
  .popup-img svg { opacity: 0.2; }
  .popup-note { margin: 0 16px; background: #0d0f12; border-left: 3px solid #f0b429; border-radius: 0 6px 6px 0; padding: 10px 12px; font-size: 13px; color: #bbb; line-height: 1.6; }
  .close-btn { width: calc(100% - 32px); margin: 16px 16px 0; background: transparent; border: 1px solid #2a2f38; color: #888; font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; padding: 10px; border-radius: 8px; cursor: pointer; }
  .close-btn:hover { border-color: #f0b429; color: #f0b429; }

  .add-btn { position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px; background: #f0b429; border-radius: 50%; border: none; font-size: 24px; color: #0d0f12; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 50; font-weight: 700; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<div id="app">

</div>

</div>

  grid.innerHTML = MAPS.map(m => `
    <div class="map-card" onclick="showDetail('${m.id}')">
      <div class="map-thumb" style="background:${m.mapColor}">
        <svg width="100%" height="100%" viewBox="0 0 340 340" style="display:block">${getMapPath(m.id)}</svg>
        <span class="lineup-badge">${m.lineups.length}</span>
      </div>
      <div class="map-info">
        <div class="map-name">${m.name}</div>
        <div class="map-meta">${m.lineups.length} lineups</div>
      </div>
    </div>
  `).join('');
}

function buildMinimapSVG(map) {
  const svg = document.getElementById('minimap-svg');
  let html = getMapPath(map.id);

  map.lineups.forEach(l => {
    const col = NADE_COLORS[l.type];
    const dx = l.tx - l.fx, dy = l.ty - l.fy;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const ex = l.fx + ux*(len-10), ey = l.fy + uy*(len-10);
    html += `<line x1="${l.fx}" y1="${l.fy}" x2="${ex}" y2="${ey}" stroke="${col}" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="4,3"/>`;
    html += `<circle cx="${l.fx}" cy="${l.fy}" r="7" fill="${col}" fill-opacity="0.2" stroke="${col}" stroke-width="1.5" style="cursor:pointer" onclick="openPopup(${JSON.stringify(l).replace(/"/g,'&quot;')})"/>`;
    html += `<circle cx="${l.fx}" cy="${l.fy}" r="3.5" fill="${col}" style="cursor:pointer" onclick="openPopup(${JSON.stringify(l).replace(/"/g,'&quot;')})"/>`;
    html += `<polygon points="${l.tx},${l.ty-5} ${l.tx-4},${l.ty+4} ${l.tx+4},${l.ty+4}" fill="${col}" fill-opacity="0.7" style="cursor:pointer" onclick="openPopup(${JSON.stringify(l).replace(/"/g,'&quot;')})"/>`;
  });
  svg.innerHTML = html;
}

function buildLineupRows(map) {
  const container = document.getElementById('lineup-rows');
  container.innerHTML = map.lineups.map(l => `
    <div class="lineup-row" onclick='openPopup(${JSON.stringify(l)})'>
      <div class="lineup-row-dot" style="background:${NADE_COLORS[l.type]}"></div>
      <div class="lineup-row-info">
        <div class="lineup-row-title">${l.name}</div>
        <div class="lineup-row-sub">${l.from} → ${l.to}</div>
      </div>
      <span class="lineup-row-arr">›</span>
    </div>
  `).join('');
}

function showDetail(mapId) {
  currentMap = MAPS.find(m => m.id === mapId);
  document.getElementById('detail-map-name').textContent = currentMap.name;
  buildMinimapSVG(currentMap);
  buildLineupRows(currentMap);
  document.getElementById('screen-maps').classList.remove('active');
  document.getElementById('screen-detail').classList.add('active');
  window.scrollTo(0,0);
}

function showMaps() {
  document.getElementById('screen-detail').classList.remove('active');
  document.getElementById('screen-maps').classList.add('active');
  window.scrollTo(0,0);
}

function openPopup(lineup) {
  if (typeof lineup === 'string') lineup = JSON.parse(lineup);
  currentLineup = lineup;
  document.getElementById('popup-title').textContent = lineup.name;
  const nadeEl = document.getElementById('popup-nade');
  nadeEl.textContent = lineup.type.toUpperCase();
  nadeEl.className = 'popup-nade nade-' + lineup.type;
  document.getElementById('popup-note').textContent = lineup.note;
  const imgStand = document.getElementById('popup-img-stand');
  const imgAim = document.getElementById('popup-img-aim');
  imgStand.innerHTML = `<svg width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="20" r="10" fill="none" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="30" y1="30" x2="30" y2="50" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="15" y1="38" x2="30" y2="32" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="45" y1="38" x2="30" y2="32" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="22" y1="60" x2="30" y2="50" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="38" y1="60" x2="30" y2="50" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/></svg>`;
  imgAim.innerHTML = `<svg width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="22" fill="none" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><circle cx="30" cy="30" r="6" fill="none" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="30" y1="2" x2="30" y2="16" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="30" y1="44" x2="30" y2="58" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="2" y1="30" x2="16" y2="30" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/><line x1="44" y1="30" x2="58" y2="30" stroke="${NADE_COLORS[lineup.type]}" stroke-width="2"/></svg>`;
  document.getElementById('overlay').classList.add('open');
}

function closePopup(e) {
  if (!e || e.target === document.getElementById('overlay') || e.currentTarget === document.querySelector('.close-btn')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

renderMaps();
</script>
